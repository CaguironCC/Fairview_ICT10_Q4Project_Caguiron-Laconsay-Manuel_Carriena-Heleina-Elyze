<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
   <title>10-Sapphire | Gallery</title>
  
   <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
   <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>
  
   <py-config>
       packages = ['numpy', 'matplotlib']
   </py-config>


   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }


       body {
           font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
           background: linear-gradient(145deg, #eef2f9 0%, #d4dfed 100%);
           min-height: 100vh;
           display: flex;
           flex-direction: column;
           color: #142d3c;
       }


       .navbar {
           background: rgba(255, 255, 255, 0.92);
           backdrop-filter: blur(10px);
           box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
           padding: 0.9rem 2rem;
           position: sticky;
           top: 0;
           z-index: 100;
           width: 100%;
           border-bottom: 1px solid rgba(44, 125, 160, 0.15);
       }


       .nav-container {
           max-width: 1100px;
           margin: 0 auto;
           display: flex;
           align-items: center;
           justify-content: space-between;
           flex-wrap: wrap;
           gap: 1rem;
       }


       .section-name {
           font-size: 1.6rem;
           font-weight: 700;
           background: linear-gradient(130deg, #0f3b5f, #2c7da0);
           background-clip: text;
           -webkit-background-clip: text;
           color: transparent;
       }


       .nav-links {
           display: flex;
           gap: 0.6rem;
           flex-wrap: wrap;
       }


       .nav-btn {
           background: transparent;
           padding: 8px 24px;
           border-radius: 40px;
           font-weight: 500;
           font-size: 0.9rem;
           border: none;
           cursor: pointer;
           font-family: inherit;
           color: #2c5368;
           text-decoration: none;
           display: inline-block;
           transition: all 0.2s;
       }


       .nav-btn.active {
           background: #2c7da0;
           color: white;
           box-shadow: 0 4px 8px rgba(44,125,160,0.25);
       }


       .nav-btn:not(.active):hover {
           background: rgba(44, 125, 160, 0.1);
           transform: translateY(-1px);
       }


       .main-wrapper {
           flex: 1;
           width: 100%;
           max-width: 1100px;
           margin: 2rem auto;
           padding: 0 1.5rem;
       }


       .tracker-card {
           background: rgba(255, 255, 255, 0.95);
           border-radius: 32px;
           box-shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.1);
           padding: 2rem;
           width: 100%;
           backdrop-filter: blur(2px);
           border: 1px solid rgba(255,255,255,0.6);
       }


       h2 {
           font-size: 1.8rem;
           font-weight: 700;
           margin-bottom: 0.25rem;
           color: #0f3b5f;
           text-align: center;
       }


       .subhead {
           color: #4a627a;
           text-align: center;
           margin-bottom: 2rem;
           font-size: 0.9rem;
           border-bottom: 1.5px solid #e2e8f0;
           padding-bottom: 0.9rem;
           font-weight: 450;
       }


       .gallery-grid {
           display: grid;
           grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
           gap: 1.8rem;
           margin-top: 1.8rem;
       }


       .gallery-card {
           background: white;
           border-radius: 28px;
           padding: 1rem 1rem 1.2rem;
           text-align: center;
           transition: all 0.25s ease;
           border: 1px solid rgba(0,0,0,0.05);
           box-shadow: 0 12px 22px -10px rgba(0, 0, 0, 0.06);
       }


       .gallery-card:hover {
           transform: translateY(-6px);
           box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.15);
           border-color: rgba(44,125,160,0.3);
       }


       .image-container {
           width: 100%;
           aspect-ratio: 1 / 0.9;
           overflow: hidden;
           border-radius: 24px;
           margin-bottom: 0.8rem;
           background: #f0f4f9;
       }


       .gallery-img {
           width: 100%;
           height: 100%;
           object-fit: cover;
           transition: transform 0.3s ease;
           display: block;
       }


       .gallery-card:hover .gallery-img {
           transform: scale(1.02);
       }


       .gallery-card h3 {
           font-size: 1rem;
           font-weight: 700;
           color: #1f4e6e;
           margin-top: 0.4rem;
           letter-spacing: -0.2px;
       }


       footer {
           text-align: center;
           font-size: 0.7rem;
           padding: 1rem 0;
           color: #4f6f8f;
           border-top: 1px solid rgba(79, 111, 143, 0.2);
           width: 100%;
           background: rgba(255, 255, 255, 0.5);
           margin-top: auto;
       }


       @media (max-width: 700px) {
           .nav-container {
               flex-direction: column;
               align-items: center;
           }
           .gallery-grid {
               grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
               gap: 1rem;
           }
           .tracker-card {
               padding: 1.5rem;
           }
       }
   </style>
</head>
<body>




<nav class="navbar">
   <div class="nav-container">
       <div class="section-name">10-Sapphire</div>
       <div class="nav-links">
           <a href="classmates.html" class="nav-btn">Classmates</a>
           <a href="index.html" class="nav-btn">Attendance Tracker</a>
           <a href="gallery.html" class="nav-btn active">Gallery</a>
       </div>
   </div>
</nav>




<div class="main-wrapper">
   <div class="tracker-card">
       <h2>Highlights of Our 10-Sapphire Journey</h2>
       <div class="subhead">Memories and moments from our class — forever treasured</div>
      
       <div class="gallery-grid">
           <div class="gallery-card">
               <div class="image-container">
                   <img class="gallery-img" src="https://ibb.co/gb9bT9K1" alt="Halloween celebration" onerror="this.src='https://placehold.co/400x300/e2e8f0/2c7da0?text=Halloween+Memories'">
               </div>
               <h3>Halloween Celebration</h3>
           </div>
           
           <div class="gallery-card">
               <div class="image-container">
                   <img class="gallery-img" src="https://ibb.co/xKsrpY9P" alt="Teachers Day celebration" onerror="this.src='https://placehold.co/400x300/e2e8f0/2c7da0?text=Teacher%27s+Day'">
               </div>
               <h3>Teacher's Day</h3>
           </div>
           
           <div class="gallery-card">
               <div class="image-container">
                   <img class="gallery-img" src="https://ibb.co/93W9WNCy" alt="President's Day event" onerror="this.src='https://placehold.co/400x300/e2e8f0/2c7da0?text=President%27s+Day'">
               </div>
               <h3>President's Day</h3>
           </div>
           
           <div class="gallery-card">
               <div class="image-container">
                   <img class="gallery-img" src="https://ibb.co/fGn81qCh" alt="JCO ceremony" onerror="this.src='https://placehold.co/400x300/e2e8f0/2c7da0?text=JCO+Ceremony'">
               </div>
               <h3>JCO</h3>
           </div>
       </div>
   </div>
</div>


<footer>Gallery | Grade 10 - Sapphire</footer>


<py-script src="main.py"></py-script>


</body>
</html>
